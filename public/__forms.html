<!--
  Static form definitions for Netlify form detection.
  Netlify scans this file at build time to register the "quote" and "contact"
  forms. The actual interactive forms live in /quote and /contact and post the
  same field names. This file is not linked from the UI.
-->
<form name="quote" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="quote" />
  <input type="text" name="name" />
  <input type="text" name="businessName" />
  <input type="email" name="email" />
  <input type="tel" name="phone" />
  <input type="text" name="state" />
  <input type="text" name="serviceType" />
  <input type="text" name="yearsInBusiness" />
  <textarea name="message"></textarea>
  <input name="bot-field" type="text" />
</form>

<form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="contact" />
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="tel" name="phone" />
  <input type="text" name="subject" />
  <textarea name="message"></textarea>
  <input name="bot-field" type="text" />
</form>
