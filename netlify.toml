[build]
  command = "pnpm run build"
  publish = "out"

[build.environment]
  NEXT_DISABLE_TURBOPACK = "1"
  NODE_VERSION = "20"

# NOTE: @netlify/plugin-nextjs INTENTIONALLY REMOVED — its runtime intercepts POST / before
# Netlify Forms can capture the lead. Static export (output:"export", publish="out") makes
# the form a statically-served path so Netlify Forms captures submissions.
[[notifications]]
  form_name = "quote"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=workerscompensationexemption.com"
    events = ["submission_created"]

[[notifications]]
  form_name = "contact"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=workerscompensationexemption.com"
    events = ["submission_created"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
